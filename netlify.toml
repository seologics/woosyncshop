[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."ai-match-products"]
  timeout = 26

[functions."stock-sync"]
  timeout = 26

[functions."sync-create"]
  timeout = 26

[functions."sync-scan"]
  timeout = 26

[functions."analytics-orders"]
  timeout = 26

[functions."analytics-insights"]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
